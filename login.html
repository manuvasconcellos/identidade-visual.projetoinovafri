<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InovaFri Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style-loginusuario.css">
</head>
<body>

    <main class="login-container">
        
        <aside class="login-media" aria-hidden="true">
            <img src="/assets/login-imagem.jpg" alt="" role="presentation">
            <div class="media-overlay-text">
                <h2>Conecte-se ao polo de inovação da região serrana.</h2>
            </div>
        </aside>

        <section class="login-content">
            <div class="brand-header">
                <span class="brand-text">InovaFri<span class="brand-highlight">Hub</span></span>
            </div>

            <header class="login-header">
                <h1>Acesse sua conta</h1>
                <p>Insira suas credenciais para continuar.</p>
            </header>
            
            <div id="error-message" class="alert-error hidden" role="alert"></div>

            <form action="/api/login" method="POST" id="form-login" novalidate>
                <fieldset>
                    <legend class="sr-only">Credenciais de Acesso</legend>
                    
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required 
                            autocomplete="email"
                            placeholder="seu@email.com"
                        >
                    </div>
                    
                    <div class="input-group">
                        <label for="senha">Senha</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="senha" 
                                name="senha" 
                                required 
                                autocomplete="current-password"
                                placeholder="••••••••"
                            >
                            <button type="button" id="btn-toggle-password" class="toggle-password" aria-label="Mostrar senha">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-eye"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                        <a href="recuperarsenha.html" id="link-recuperar" tabindex="4">Esqueceu sua senha?</a>
                    </div>
                </fieldset>
                
                <div class="form-actions">
                    <button type="submit" class="btn-submit" id="btn-submit">Entrar no Ecossistema</button>
                    <p class="register-prompt">Ainda não tem cadastro? <a href="cadastro.html" class="link-destaque">Crie sua conta</a></p>
                </div>
            </form>
        </section>

    </main>

    <script src="js/login-usuario.js"></script>
</body>
</html>
