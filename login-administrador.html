<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InovFriValley - Acesso Administrativo</title>
</head>
<body>

    <main aria-labelledby="login-title">
        <header>
            <h1 id="login-title">Acesso ao Painel</h1>
            <p>Olá, administrador! Insira suas credenciais para gerenciar o ecossistema.</p>
        </header>

        <section>
            <form action="/api/admin/login" method="POST" id="form-login-admin">
                
                <input type="hidden" name="csrf_token" value="gerado_dinamicamente_pelo_backend">

                <fieldset>
                    <legend class="sr-only">Credenciais de Acesso</legend>

                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required 
                            autofocus
                            autocomplete="username"
                            placeholder="seu@email.com"
                        >
                    </div>

                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required 
                            autocomplete="current-password"
                        >
                    </div>
                </fieldset>

                <div class="form-actions">
                    <a href="/admin/recuperar-senha" id="link-recuperar-senha">Esqueci minha senha</a>
                    <button type="submit">Entrar no Sistema</button>
                </div>

            </form>
        </section>

    </main>

</body>
</html>
