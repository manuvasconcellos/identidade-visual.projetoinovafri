<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - InovaFri Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style-recuperarsenha.css">
</head>
<body>

    <main class="recuperacao-container" aria-labelledby="recuperacao-titulo">
        
        <div class="brand-header">
            <a href="index.html" aria-label="Voltar para a Home">
                <img src="assets/Logo-InovaFri.png" alt="InovaFri Hub" width="180" height="auto" class="brand-logo" fetchpriority="high">
            </a>
        </div>

        <header id="header-instrucoes">
            <h1 id="recuperacao-titulo">Recuperação de Acesso</h1>
            <p>Insira o e-mail vinculado ao seu perfil. Enviaremos um link seguro para a criação de uma nova senha.</p>
        </header>

        <section class="recuperacao-content">
            
            <div id="error-message" class="alert-error hidden" role="alert"></div>

            <form action="/api/auth/solicitar-recuperacao" method="POST" id="form-recuperacao" novalidate>
                <fieldset>
                    <legend class="sr-only">Dados para identificação da conta</legend>
                    
                    <div class="input-group">
                        <label for="email-recuperacao">E-mail Cadastrado</label>
                        <input 
                            type="email" 
                            id="email-recuperacao" 
                            name="email" 
                            required 
                            autofocus
                            autocomplete="email"
                            placeholder="seu.nome@exemplo.com.br"
                            aria-describedby="email-help"
                        >
                        <small id="email-help">Certifique-se de digitar o mesmo endereço utilizado no seu cadastro.</small>
                    </div>
                </fieldset>

                <div class="form-actions">
                    <button type="submit" id="btn-submit" class="btn-primary-block">Enviar Link de Recuperação</button>
                </div>
            </form>
        </section>
    </main>
    <script src="js/recuperar.js"></script>
</body>
</html>
