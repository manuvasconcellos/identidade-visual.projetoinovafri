<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InovaFri Hub</title>
    <link rel="stylesheet" href="css/style-loginusuario.css">
</head>
<body>

    <main class="login-container">
        
        <aside class="login-media" aria-hidden="true">
            <img src="/assets/login-imagem.jpg" alt="" role="presentation">
        </aside>

        <section class="login-content">
            <header>
                <h1>Login</h1>
            </header>
            
            <form action="/api/login" method="POST" id="form-login">
                <fieldset>
                    <legend class="sr-only">Credenciais de Acesso</legend>
                    
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required 
                            autocomplete="email"
                        >
                    </div>
                    
                    <div class="input-group">
                        <label for="senha">Senha</label>
                        <input 
                            type="password" 
                            id="senha" 
                            name="senha" 
                            required 
                            autocomplete="current-password"
                        >
                    </div>
                </fieldset>
                
                <div class="form-actions">
                    <a href="/recuperarsenha.html" id="link-recuperar">Esqueceu sua senha?</a>
                    <button type="submit" class="btn-submit">Entrar</button>
                </div>
            </form>
        </section>

    </main>

</body>
</html>
