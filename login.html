<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InovaFri Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style-loginusuario.css">
</head>
<body>

    <main class="login-container">
        
        <aside class="login-media" aria-hidden="true">
            <img src="assets/bg-friburgo-tech.jpg" alt="" role="presentation">
            <div class="media-overlay-text">
                <h2>Conecte-se ao ecossistema de inovação da região serrana.</h2>
            </div>
        </aside>

        <section class="login-content">
            <div class="brand-header">
                <a href="index.html" aria-label="Voltar à Página Inicial">
                    <img src="assets/Logo-InovaFri.png" alt="InovaFri Hub" width="180" height="auto" class="brand-logo" fetchpriority="high">
                </a>
            </div>

            <header class="login-header">
                <h1>Acesso ao Ecossistema</h1>
                <p>Insira as suas credenciais operacionais para continuar.</p>
            </header>
            
            <div id="error-message" class="alert-error hidden" role="alert"></div>

            <form action="/api/login" method="POST" id="form-login" novalidate>
                <fieldset>
                    <legend class="sr-only">Credenciais de Acesso</legend>
                    
                    <div class="input-group">
                        <label for="email">E-mail Institucional</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required 
                            autocomplete="email"
                            placeholder="o-seu@email.com"
                        >
                    </div>
                    
                    <div class="input-group">
                        <label for="senha">Palavra-passe</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="senha" 
                                name="senha" 
                                required 
                                autocomplete="current-password"
                                placeholder="••••••••"
                            >
                            <button type="button" id="btn-toggle-password" class="toggle-password" aria-label="Mostrar palavra-passe">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-eye"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>
                        <a href="recuperarsenha.html" id="link-recuperar" tabindex="4">Esqueceu a sua credencial?</a>
                    </div>
                </fieldset>
                
                <div class="form-actions">
                    <a href="dashboard-ator.html" class="btn-submit">
                        Autenticar Sessão
                    </a>
                    <p class="register-prompt">Ainda não possui registo? <a href="cadastro.html" class="link-destaque">Solicitar Acesso</a></p>
                </div>
            </form>
        </section>

    </main>

    <script src="js/login-usuario.js"></script>
</body>
</html>
